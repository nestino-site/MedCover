<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none" role="img" aria-label="MedCover">
  <!-- Shield/document mark -->
  <rect x="2" y="4" width="24" height="32" rx="4" fill="#0f2040"/>
  <rect x="8" y="2" width="24" height="32" rx="4" fill="#1a3460" opacity="0.7"/>
  <!-- Cross cutout in primary rect -->
  <rect x="11" y="13" width="6" height="14" rx="1" fill="white"/>
  <rect x="7" y="17" width="14" height="6" rx="1" fill="white"/>
  <!-- Wordmark -->
  <text x="42" y="26" font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="-0.5" fill="#0f2040">Med</text>
  <text x="80" y="26" font-family="'Geist', 'Inter', ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="400" letter-spacing="-0.3" fill="#0f2040">Cover</text>
</svg>
